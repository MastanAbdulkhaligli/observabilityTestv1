# =========================================================
# OPENTELEMETRY CONFIGURATION
# =========================================================
otel:
  service:
    name: demo-service

  resource:
    attributes:
      service.version: 1.0.0
      deployment.environment: local
      team: backend

  traces:
    exporter: otlp

  metrics:
    exporter: otlp

  logs:
    exporter: none

  exporter:
    otlp:
      endpoint: http://localhost:4317
      protocol: grpc
      compression: gzip
      timeout: 30000

# =========================================================
# LOGGING (JSON STRUCTURED LOGGING)
# =========================================================
logging:
  level:
    root: INFO
    org.springframework: INFO
    org.apache.catalina: INFO
    io.opentelemetry: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true
