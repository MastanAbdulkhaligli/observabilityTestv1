spring:
  application:
    name: observabilityTest




observability:

  # -------------------------------------------------------
  # SERVICE METADATA (used in logs + metrics + spans)
  # -------------------------------------------------------
  service:
    app-name: demo-app
    service-name: demo-service
    module: demo-module
    component: demo-component
    env: local

  # -------------------------------------------------------
  # HTTP OBSERVABILITY FILTER
  # -------------------------------------------------------
  http:
    enabled: true
    filter-order: -2147483638

    max-cached-body-bytes: 0
    max-body-bytes-to-parse: 4096
    extract-magus-ids-from-json-body: false

  # -------------------------------------------------------
  # TRACING CONFIG
  # -------------------------------------------------------
  tracing:
    backend: otel          # simple | otel

  # -------------------------------------------------------
  # METRICS CONFIG
  # -------------------------------------------------------
  metrics:
    backend: otel          # noop | otel
    otel:
      duration-unit: ms    # ns | ms | s

  # -------------------------------------------------------
  # LAYER OBSERVATION POLICY (your existing feature)
  # -------------------------------------------------------
  layer:
    controller: full       # full | nospan | metricsonly | disabled
    service: full
    repository: full

  # -------------------------------------------------------
  # ASPECTJ RUNTIME POLICY (NEW) - controls what gets observed
