input {
  beats {
    port => 5044

    # Helps prevent idle socket resets when pipeline is busy
    client_inactivity_timeout => 300

    # Optional tuning
    # executor_threads => 4
  }
}

filter {
  #
  # 0) Filebeat "container" parser already unwraps Docker JSON into "message"
  #    BUT: keep this safety net if some lines arrive as raw docker JSON
  #
  if [message] =~ '^\{' and ![app] {
    json {
      source => "message"
      target => "docker"
      skip_on_invalid_json => true
    }

    if [docker][log] {
      mutate { replace => { "message" => "%{[docker][log]}" } }
    }
  }

  #
  # 1) Parse your app JSON logs into [app]
  #
  json {
    source => "message"
    target => "app"
    skip_on_invalid_json => true
  }

  #
  # 2) Set @timestamp correctly (DON’T mutate replace; use date filter)
  #
  if [app][@timestamp] {
    date {
      match => ["[app][@timestamp]", "ISO8601"]
      target => "@timestamp"
    }
  }

  #
  # 3) Promote common fields ONLY if they exist
  #    (prevents "%{[app][level]}" placeholders)
  #
  if [app][level] { mutate { add_field => { "level" => "%{[app][level]}" } } }
  if [app][logger] { mutate { add_field => { "logger" => "%{[app][logger]}" } } }

  # Prefer your top-level fields like "service.name" if present, else fallback
  if [app][service.name] and [app][service.name] != "" {
    mutate { add_field => { "service.name" => "%{[app][service.name]}" } }
  } else if [app][service][name] and [app][service][name] != "" {
    mutate { add_field => { "service.name" => "%{[app][service][name]}" } }
  }

  if [app][service.env] and [app][service.env] != "" {
    mutate { add_field => { "service.env" => "%{[app][service.env]}" } }
  } else if [app][service][env] and [app][service][env] != "" {
    mutate { add_field => { "service.env" => "%{[app][service][env]}" } }
  }

  #
  # 4) Cleanup (optional but recommended)
  #
  mutate {
    # Remove giant original message if you only want parsed JSON
    # remove_field => ["message"]

    # Remove docker safety object if it exists
    remove_field => ["docker"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "app-logs-%{+YYYY.MM.dd}"

    # More stable when ES is temporarily slow
    # ilm_enabled => false
  }

  # IMPORTANT: rubydebug is heavy and can cause backpressure under load.
  # Use a lightweight stdout codec (or disable completely).
  stdout { codec => dots }
}
